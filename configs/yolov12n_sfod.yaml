# configs/yolov12n_sfod.yaml  —  SFOD v3 (fixed args format)
# Cùng fix: bỏ explicit n ra khỏi C3k2 args, dùng cột n ngoài.
nc: 10
ch: 3

backbone:
  - [-1,  1, Conv,  [16, 3, 2]]
  - [-1,  1, Conv,  [32, 3, 2]]
  - [-1,  1, C3k2,  [64, False, 0.25]]   # 2 ← P2 feats
  - [-1,  1, Conv,  [64, 3, 2]]
  - [-1,  1, C3k2,  [128, False, 0.25]]  # 4 ← P3 feats
  - [-1,  1, Conv,  [128, 3, 2]]
  - [-1,  2, C3k2,  [128, False, 0.5]]   # 6 ← P4 feats
  - [-1,  1, Conv,  [256, 3, 2]]
  - [-1,  2, C3k2,  [256, False, 0.5]]   # 8 ← P5 feats

head:
  - [-1,      1, nn.Upsample, [None, 2, 'nearest']]
  - [[-1, 6], 1, Concat,      [1]]
  - [-1,      1, C3k2,        [128, False]]            # 11
  - [-1,      1, nn.Upsample, [None, 2, 'nearest']]
  - [[-1, 4], 1, Concat,      [1]]
  - [-1,      1, C3k2,        [64, False]]             # 14 ← P3 base
  - [14,      1, nn.Upsample, [None, 2, 'nearest']]
  - [[-1, 2], 1, Concat,      [1]]
  - [-1,      1, GhostConv,   [32]]                    # 17 ← P2 detect
  - [17,       1, Conv,      [32, 3, 2]]
  - [[-1, 14], 1, Concat,    [1]]
  - [-1,       1, GhostConv, [64]]                     # 20 ← P3 detect
  - [-1,       1, Conv,      [64, 3, 2]]
  - [[-1, 11], 1, Concat,    [1]]
  - [-1,       1, GhostConv, [128]]                    # 23 ← P4 detect
  - [-1,       1, Conv,      [128, 3, 2]]
  - [[-1, 8],  1, Concat,    [1]]
  - [-1,       1, C3k2,      [256, True]]              # 26 ← P5 detect
  - [[17, 20, 23, 26], 1, Detect, [nc]]                # 27
